<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NightScore - Verificación de Edad</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&amp;family=Hanken+Grotesk:wght@500;600;700&amp;family=Sora:wght@700;800&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#39383e",
                        "background": "#131318",
                        "error-container": "#93000a",
                        "secondary": "#4cd7f6",
                        "inverse-surface": "#e4e1e9",
                        "surface-dim": "#131318",
                        "on-tertiary-fixed-variant": "#8c0053",
                        "on-secondary-container": "#00424e",
                        "on-tertiary": "#640039",
                        "inverse-on-surface": "#303036",
                        "tertiary": "#ffb0cd",
                        "on-secondary-fixed": "#001f26",
                        "surface-container-highest": "#35343a",
                        "surface-container-lowest": "#0e0e13",
                        "surface-tint": "#d2bbff",
                        "on-error": "#690005",
                        "tertiary-container": "#bf2076",
                        "outline": "#958da1",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#ffdde7",
                        "on-primary-fixed-variant": "#5a00c6",
                        "secondary-container": "#03b5d3",
                        "surface-variant": "#35343a",
                        "on-surface": "#e4e1e9",
                        "tertiary-fixed": "#ffd9e4",
                        "on-tertiary-fixed": "#3e0022",
                        "surface-container-high": "#2a292f",
                        "surface-container-low": "#1b1b20",
                        "surface-container": "#1f1f25",
                        "on-primary-fixed": "#25005a",
                        "on-secondary-fixed-variant": "#004e5c",
                        "primary-fixed-dim": "#d2bbff",
                        "primary-container": "#7c3aed",
                        "on-primary": "#3f008e",
                        "secondary-fixed-dim": "#4cd7f6",
                        "primary": "#d2bbff",
                        "on-primary-container": "#ede0ff",
                        "on-surface-variant": "#ccc3d8",
                        "surface": "#131318",
                        "tertiary-fixed-dim": "#ffb0cd",
                        "secondary-fixed": "#acedff",
                        "on-background": "#e4e1e9",
                        "on-secondary": "#003640",
                        "inverse-primary": "#732ee4",
                        "outline-variant": "#4a4455",
                        "error": "#ffb4ab",
                        "primary-fixed": "#eaddff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding-h": "20px",
                        "inline-md": "16px",
                        "section-margin": "32px",
                        "inline-sm": "8px",
                        "card-gap": "12px"
                    },
                    "fontFamily": {
                        "data-mono": ["Geist Mono"],
                        "headline-md": ["Sora"],
                        "body-lg": ["Hanken Grotesk"],
                        "caption-caps": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-hero": ["Sora"],
                        "headline-lg": ["Sora"]
                    },
                    "fontSize": {
                        "data-mono": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "caption-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "display-hero": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-card {
            background: rgba(19, 19, 24, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-button {
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
        }
        .input-glow:focus {
            outline: none;
            border-color: theme('colors.secondary');
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.3);
        }
        
        /* Ambient background effect */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: theme('colors.background');
        }
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: theme('colors.primary-container');
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: theme('colors.tertiary-container');
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }
        
        /* Select styling */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e4e1e9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-container-padding-h relative overflow-hidden bg-background text-on-background">
<!-- Ambient Background -->
<div class="ambient-bg">
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-md flex flex-col items-center z-10">
<!-- Brand / Header -->
<div class="mb-section-margin text-center">
<h1 class="font-headline-lg text-headline-lg bg-gradient-to-r from-primary to-primary-fixed bg-clip-text text-transparent inline-block">NightScore</h1>
</div>
<!-- Verification Card -->
<div class="glass-card rounded-xl p-6 w-full flex flex-col items-center relative overflow-hidden">
<!-- Icon/Visual -->
<div class="relative w-24 h-24 mb-6 flex items-center justify-center">
<div class="absolute inset-0 bg-error/10 rounded-full blur-xl"></div>
<span class="material-symbols-outlined text-6xl text-error relative z-10" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="material-symbols-outlined text-4xl text-on-surface absolute bottom-0 right-0 transform translate-x-2 translate-y-2 bg-surface-dim rounded-full p-1" data-icon="local_bar">local_bar</span>
</div>
<!-- Titles -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-2 text-center">Verificación de Edad</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-8">NightScore es para mayores de 18 años.</p>
<!-- Date Picker Form -->
<form action="#" class="w-full flex flex-col gap-inline-md" id="age-form" method="POST">
<div class="flex gap-inline-sm w-full">
<!-- Day -->
<div class="flex-1">
<label class="sr-only" for="day">Día</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="day" name="day">
<option disabled="" selected="" value="">DD</option>
<!-- JS will populate -->
</select>
</div>
<!-- Month -->
<div class="flex-1">
<label class="sr-only" for="month">Mes</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="month" name="month">
<option disabled="" selected="" value="">MM</option>
<!-- JS will populate -->
</select>
</div>
<!-- Year -->
<div class="flex-[1.5]">
<label class="sr-only" for="year">Año</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="year" name="year">
<option disabled="" selected="" value="">AAAA</option>
<!-- JS will populate -->
</select>
</div>
</div>
<!-- Error Message (Hidden by default) -->
<p class="text-error font-caption-caps text-caption-caps text-center mt-2 hidden opacity-0 transition-opacity duration-300" id="error-msg">Debes ser mayor de 18 años para entrar.</p>
<!-- Submit Button -->
<button class="mt-section-margin w-full bg-primary-container text-on-primary font-body-lg text-body-lg py-4 rounded-full glow-button transition-transform duration-200 hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2" id="submit-btn" type="submit">
                    Confirmar edad
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Note -->
<div class="mt-section-margin text-center opacity-60 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="info">info</span>
<p class="font-caption-caps text-caption-caps text-on-surface-variant">NightScore promueve el consumo responsable.</p>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Populate Dropdowns
            const daySelect = document.getElementById('day');
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const currentYear = new Date().getFullYear();

            // Days
            for (let i = 1; i <= 31; i++) {
                let option = document.createElement('option');
                option.value = i < 10 ? '0' + i : i;
                option.text = i < 10 ? '0' + i : i;
                daySelect.appendChild(option);
            }

            // Months
            for (let i = 1; i <= 12; i++) {
                let option = document.createElement('option');
                option.value = i < 10 ? '0' + i : i;
                option.text = i < 10 ? '0' + i : i;
                monthSelect.appendChild(option);
            }

            // Years (allow down to 100 years ago, up to current year)
            for (let i = currentYear; i >= currentYear - 100; i--) {
                let option = document.createElement('option');
                option.value = i;
                option.text = i;
                yearSelect.appendChild(option);
            }

            // Simple validation logic
            const form = document.getElementById('age-form');
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const d = daySelect.value;
                const m = monthSelect.value;
                const y = yearSelect.value;

                if (!d || !m || !y) {
                    showError("Completa tu fecha de nacimiento.");
                    return;
                }

                const birthDate = new Date(`${y}-${m}-${d}`);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const mDiff = today.getMonth() - birthDate.getMonth();
                
                if (mDiff < 0 || (mDiff === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }

                if (age < 18) {
                    showError("Debes ser mayor de 18 años para entrar.");
                    // Optional shake animation
                    form.classList.add('animate-pulse');
                    setTimeout(() => form.classList.remove('animate-pulse'), 500);
                } else {
                    // Success state
                    errorMsg.classList.add('hidden');
                    errorMsg.classList.remove('opacity-100');
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                    btn.classList.add('opacity-80', 'cursor-wait');
                    
                    // Simulate navigation
                    setTimeout(() => {
                        window.location.href = '#success';
                    }, 1500);
                }
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                // slight delay for transition
                setTimeout(() => {
                    errorMsg.classList.add('opacity-100');
                }, 10);
            }
            
            // Clear error on change
            [daySelect, monthSelect, yearSelect].forEach(select => {
                select.addEventListener('change', () => {
                    errorMsg.classList.add('hidden');
                    errorMsg.classList.remove('opacity-100');
                });
            });
        });
    </script>
</body></html>
