<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-card {
            background: rgba(19, 19, 24, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-button {
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
        }
        .input-glow:focus {
            outline: none;
            border-color: theme('colors.secondary');
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.3);
        }
        
        /* Ambient background effect */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: theme('colors.background');
        }
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: theme('colors.primary-container');
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: theme('colors.tertiary-container');
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }
        
        /* Select styling */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e4e1e9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;

<style>

<!-- Ambient Background -->
<div class="ambient-bg">
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-md flex flex-col items-center z-10">
<!-- Brand / Header -->
<div class="mb-section-margin text-center">
<h1 class="font-headline-lg text-headline-lg bg-gradient-to-r from-primary to-primary-fixed bg-clip-text text-transparent inline-block">Festify</h1>
</div>
<!-- Verification Card -->
<div class="glass-card rounded-xl p-6 w-full flex flex-col items-center relative overflow-hidden">
<!-- Icon/Visual -->
<div class="relative w-24 h-24 mb-6 flex items-center justify-center">
<div class="absolute inset-0 bg-error/10 rounded-full blur-xl"></div>
<span class="material-symbols-outlined text-6xl text-error relative z-10" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="material-symbols-outlined text-4xl text-on-surface absolute bottom-0 right-0 transform translate-x-2 translate-y-2 bg-surface-dim rounded-full p-1" data-icon="local_bar">local_bar</span>
</div>
<!-- Titles -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-2 text-center">Verificación de Edad</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-8">Festify es para mayores de 18 años.</p>
<!-- Date Picker Form -->
<form action="#" class="w-full flex flex-col gap-inline-md" id="age-form" method="POST">
<div class="flex gap-inline-sm w-full">
<!-- Day -->
<div class="flex-1">
<label class="sr-only" for="day">Día</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="day" name="day">
<option disabled="" selected="" value="">DD</option>
<!-- JS will populate -->
<option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option></select>
</div>
<!-- Month -->
<div class="flex-1">
<label class="sr-only" for="month">Mes</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="month" name="month">
<option disabled="" selected="" value="">MM</option>
<!-- JS will populate -->
<option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select>
</div>
<!-- Year -->
<div class="flex-[1.5]">
<label class="sr-only" for="year">Año</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded-lg font-data-mono text-data-mono text-on-surface px-4 py-3 input-glow transition-all duration-200" id="year" name="year">
<option disabled="" selected="" value="">AAAA</option>
<!-- JS will populate -->
<option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option><option value="2022">2022</option><option value="2021">2021</option><option value="2020">2020</option><option value="2019">2019</option><option value="2018">2018</option><option value="2017">2017</option><option value="2016">2016</option><option value="2015">2015</option><option value="2014">2014</option><option value="2013">2013</option><option value="2012">2012</option><option value="2011">2011</option><option value="2010">2010</option><option value="2009">2009</option><option value="2008">2008</option><option value="2007">2007</option><option value="2006">2006</option><option value="2005">2005</option><option value="2004">2004</option><option value="2003">2003</option><option value="2002">2002</option><option value="2001">2001</option><option value="2000">2000</option><option value="1999">1999</option><option value="1998">1998</option><option value="1997">1997</option><option value="1996">1996</option><option value="1995">1995</option><option value="1994">1994</option><option value="1993">1993</option><option value="1992">1992</option><option value="1991">1991</option><option value="1990">1990</option><option value="1989">1989</option><option value="1988">1988</option><option value="1987">1987</option><option value="1986">1986</option><option value="1985">1985</option><option value="1984">1984</option><option value="1983">1983</option><option value="1982">1982</option><option value="1981">1981</option><option value="1980">1980</option><option value="1979">1979</option><option value="1978">1978</option><option value="1977">1977</option><option value="1976">1976</option><option value="1975">1975</option><option value="1974">1974</option><option value="1973">1973</option><option value="1972">1972</option><option value="1971">1971</option><option value="1970">1970</option><option value="1969">1969</option><option value="1968">1968</option><option value="1967">1967</option><option value="1966">1966</option><option value="1965">1965</option><option value="1964">1964</option><option value="1963">1963</option><option value="1962">1962</option><option value="1961">1961</option><option value="1960">1960</option><option value="1959">1959</option><option value="1958">1958</option><option value="1957">1957</option><option value="1956">1956</option><option value="1955">1955</option><option value="1954">1954</option><option value="1953">1953</option><option value="1952">1952</option><option value="1951">1951</option><option value="1950">1950</option><option value="1949">1949</option><option value="1948">1948</option><option value="1947">1947</option><option value="1946">1946</option><option value="1945">1945</option><option value="1944">1944</option><option value="1943">1943</option><option value="1942">1942</option><option value="1941">1941</option><option value="1940">1940</option><option value="1939">1939</option><option value="1938">1938</option><option value="1937">1937</option><option value="1936">1936</option><option value="1935">1935</option><option value="1934">1934</option><option value="1933">1933</option><option value="1932">1932</option><option value="1931">1931</option><option value="1930">1930</option><option value="1929">1929</option><option value="1928">1928</option><option value="1927">1927</option><option value="1926">1926</option></select>
</div>
</div>
<!-- Error Message (Hidden by default) -->
<p class="text-error font-caption-caps text-caption-caps text-center mt-2 hidden opacity-0 transition-opacity duration-300" id="error-msg">Debes ser mayor de 18 años para entrar.</p>
<!-- Submit Button -->
<button class="mt-section-margin w-full bg-primary-container text-on-primary font-body-lg text-body-lg py-4 rounded-full glow-button transition-transform duration-200 hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2" id="submit-btn" type="submit">
                    Confirmar edad
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Note -->
<div class="mt-section-margin text-center opacity-60 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="info">info</span>
<p class="font-caption-caps text-caption-caps text-on-surface-variant">Festify promueve el consumo responsable.</p>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Populate Dropdowns
            const daySelect = document.getElementById('day');
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const currentYear = new Date().getFullYear();

            // Days
            for (let i = 1; i <= 31; i++) {
                let option = document.createElement('option');
                option.value = i < 10 ? '0' + i : i;
                option.text = i < 10 ? '0' + i : i;
                daySelect.appendChild(option);
            }

            // Months
            for (let i = 1; i <= 12; i++) {
                let option = document.createElement('option');
                option.value = i < 10 ? '0' + i : i;
                option.text = i < 10 ? '0' + i : i;
                monthSelect.appendChild(option);
            }

            // Years (allow down to 100 years ago, up to current year)
            for (let i = currentYear; i >= currentYear - 100; i--) {
                let option = document.createElement('option');
                option.value = i;
                option.text = i;
                yearSelect.appendChild(option);
            }

            // Simple validation logic
            const form = document.getElementById('age-form');
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const d = daySelect.value;
                const m = monthSelect.value;
                const y = yearSelect.value;

                if (!d || !m || !y) {
                    showError("Completa tu fecha de nacimiento.");
                    return;
                }

                const birthDate = new Date(`${y}-${m}-${d}`);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const mDiff = today.getMonth() - birthDate.getMonth();
                
                if (mDiff < 0 || (mDiff === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }

                if (age < 18) {
                    showError("Debes ser mayor de 18 años para entrar.");
                    // Optional shake animation
                    form.classList.add('animate-pulse');
                    setTimeout(() => form.classList.remove('animate-pulse'), 500);
                } else {
                    // Success state
                    errorMsg.classList.add('hidden');
                    errorMsg.classList.remove('opacity-100');
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                    btn.classList.add('opacity-80', 'cursor-wait');
                    
                    // Simulate navigation
                    setTimeout(() => {
                        window.location.href = '#success';
                    }, 1500);
                }
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                // slight delay for transition
                setTimeout(() => {
                    errorMsg.classList.add('opacity-100');
                }, 10);
            }
            
            // Clear error on change
            [daySelect, monthSelect, yearSelect].forEach(select => {
                select.addEventListener('change', () => {
                    errorMsg.classList.add('hidden');
                    errorMsg.classList.remove('opacity-100');
                });
            });
        });
    </script>


</body></html>
