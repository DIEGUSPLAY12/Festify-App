<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NightScore - Detalles de la noche</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;family=Hanken+Grotesk:wght@500;600;700&amp;family=Geist+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#ffdde7",
                        "on-secondary": "#003640",
                        "surface-variant": "#35343a",
                        "surface-container-highest": "#35343a",
                        "surface-bright": "#39383e",
                        "outline": "#958da1",
                        "inverse-primary": "#732ee4",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#8c0053",
                        "surface-container-high": "#2a292f",
                        "primary-fixed-dim": "#d2bbff",
                        "on-tertiary-fixed": "#3e0022",
                        "on-surface": "#e4e1e9",
                        "on-secondary-container": "#00424e",
                        "tertiary-fixed": "#ffd9e4",
                        "outline-variant": "#4a4455",
                        "on-primary-container": "#ede0ff",
                        "on-primary-fixed-variant": "#5a00c6",
                        "on-primary": "#3f008e",
                        "surface-container": "#1f1f25",
                        "on-primary-fixed": "#25005a",
                        "surface": "#131318",
                        "background": "#131318",
                        "secondary-fixed": "#acedff",
                        "error": "#ffb4ab",
                        "tertiary": "#ffb0cd",
                        "secondary": "#4cd7f6",
                        "inverse-surface": "#e4e1e9",
                        "surface-tint": "#d2bbff",
                        "on-secondary-fixed": "#001f26",
                        "on-tertiary": "#640039",
                        "surface-container-lowest": "#0e0e13",
                        "primary-fixed": "#eaddff",
                        "on-surface-variant": "#ccc3d8",
                        "on-secondary-fixed-variant": "#004e5c",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1b1b20",
                        "secondary-fixed-dim": "#4cd7f6",
                        "tertiary-fixed-dim": "#ffb0cd",
                        "surface-dim": "#131318",
                        "secondary-container": "#03b5d3",
                        "inverse-on-surface": "#303036",
                        "on-background": "#e4e1e9",
                        "primary-container": "#7c3aed",
                        "tertiary-container": "#bf2076",
                        "error-container": "#93000a",
                        "primary": "#d2bbff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "32px",
                        "inline-md": "16px",
                        "container-padding-h": "20px",
                        "card-gap": "12px",
                        "inline-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Sora"],
                        "headline-lg": ["Sora"],
                        "body-md": ["Hanken Grotesk"],
                        "caption-caps": ["Hanken Grotesk"],
                        "display-hero": ["Sora"],
                        "data-mono": ["Geist Mono"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "caption-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "display-hero": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "data-mono": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #13131A;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(76, 215, 246, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(19, 19, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-glass {
            background: rgba(19, 19, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #4cd7f6;
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.2);
            outline: none;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #d2bbff;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
            border: 2px solid #13131A;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: linear-gradient(90deg, #7c3aed, #4cd7f6);
            border-radius: 2px;
        }

        /* Custom Toggle */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4cd7f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4cd7f6;
        }

        /* Glow effects */
        .glow-primary {
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.3);
        }
        .glow-secondary {
            box-shadow: 0 0 20px rgba(76, 215, 246, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background pb-32">
<!-- Top Navigation (Suppressed per intent: Linear/Transactional Flow - "Paso 3") -->
<!-- But keeping a simplified header for flow context -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-lg border-b border-white/5 h-16 flex items-center px-container-padding-h justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors">arrow_back</span>
</button>
<span class="font-data-mono text-data-mono text-primary tracking-widest uppercase">Paso 3/4</span>
<div class="w-10"></div> <!-- Spacer -->
</header>
<main class="pt-24 px-container-padding-h max-w-2xl mx-auto space-y-section-margin">
<!-- Header Text -->
<div class="space-y-2">
<h1 class="font-display-hero text-display-hero text-transparent bg-clip-text bg-gradient-to-r from-primary via-tertiary to-secondary">
                Detalles de la noche
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Registra dónde estuviste y con quién.
            </p>
</div>
<form class="space-y-section-margin" onsubmit="event.preventDefault(); window.location.href='#';">
<!-- Location Section -->
<section class="glass-card rounded-xl p-inline-md space-y-card-gap">
<div class="flex items-center justify-between mb-4">
<label class="font-body-lg text-body-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
                        ¿Dónde estabas?
                    </label>
<!-- Geo Toggle -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-container-high appearance-none cursor-pointer transition-all duration-300 z-10" id="geo-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-high cursor-pointer transition-colors duration-300" for="geo-toggle"></label>
</div>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg input-glass font-body-md text-body-md text-on-surface placeholder:text-outline-variant" placeholder="Ej. Club Space, Fabrik..." type="text" value="Fabrik Madrid"/>
</div>
</section>
<!-- Friends Section -->
<section class="glass-card rounded-xl p-inline-md space-y-card-gap">
<label class="font-body-lg text-body-lg text-on-surface flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">group</span>
                    ¿Con quién?
                </label>
<div class="flex flex-wrap gap-inline-sm">
<!-- Friend Chip 1 -->
<div class="flex items-center gap-2 bg-surface-container/80 border border-white/10 rounded-full pr-4 p-1">
<img class="w-6 h-6 rounded-full object-cover" data-alt="Close up portrait of a young woman with neon lighting in a dark club environment. The lighting is cinematic, highlighting her features with cyan and magenta hues against a deep black background, fitting the high-end nightlife aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5VYHnzfBjrhIx6WaxKY-OBMYIktkinl6Y-VO-2Qj2YlCIWHxrj9nDtrKIJAt1SSpIgRaK2brNaIi0DFNyDcaRttWJ1KYA1smQkULI1BykizVHYdprSwWZ0JK1HBI5pY3pa1caYL3so9I0SqMzqFaC-19acXbgBwcupOOvUSN__BYygOzNcUmyE1I8cAVWdbcSxESqOl0d5nMOaOguyF96Qz1uTMNj_hiIrjXXh09v7sqQ9pVBLRSTZnMdWTI4Mz7qZmI4qZabNOc"/>
<span class="font-body-md text-body-md text-sm text-on-surface">@ana_rx</span>
<button class="material-symbols-outlined text-on-surface-variant hover:text-error text-sm transition-colors" type="button">close</button>
</div>
<!-- Friend Chip 2 -->
<div class="flex items-center gap-2 bg-surface-container/80 border border-white/10 rounded-full pr-4 p-1">
<div class="w-6 h-6 rounded-full bg-gradient-to-br from-tertiary to-primary flex items-center justify-center font-caption-caps text-caption-caps text-on-primary">M</div>
<span class="font-body-md text-body-md text-sm text-on-surface">@mario.dj</span>
<button class="material-symbols-outlined text-on-surface-variant hover:text-error text-sm transition-colors" type="button">close</button>
</div>
<!-- Add Friend -->
<button class="flex items-center gap-2 bg-transparent border border-dashed border-outline-variant rounded-full px-4 py-1.5 hover:border-secondary hover:text-secondary transition-colors text-on-surface-variant font-body-md text-sm" type="button">
<span class="material-symbols-outlined text-sm">add</span>
                        Etiquetar
                    </button>
</div>
</section>
<!-- Rating Slider Section -->
<section class="glass-card rounded-xl p-inline-md space-y-card-gap">
<div class="flex items-center justify-between mb-6">
<label class="font-body-lg text-body-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">star</span>
                        Valoración
                    </label>
<div class="font-display-hero text-display-hero text-primary" id="rating-value">8.5</div>
</div>
<div class="pt-2 pb-4 px-2">
<input id="night-rating" max="10" min="1" oninput="document.getElementById('rating-value').innerText = parseFloat(this.value).toFixed(1)" step="0.1" type="range" value="8.5"/>
<div class="flex justify-between mt-2 font-data-mono text-xs text-on-surface-variant">
<span>Meh (1)</span>
<span>Épico (10)</span>
</div>
</div>
</section>
<!-- Mood Selector Section -->
<section class="glass-card rounded-xl p-inline-md space-y-card-gap">
<label class="font-body-lg text-body-lg text-on-surface flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">mood</span>
                    Vibe de la noche
                </label>
<div class="grid grid-cols-2 gap-3">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="mood" type="radio" value="epica"/>
<div class="p-3 rounded-lg border border-white/10 bg-surface-container/50 peer-checked:border-primary peer-checked:bg-primary/10 transition-all text-center">
<span class="block text-xl mb-1">🔥</span>
<span class="font-body-md text-sm text-on-surface font-semibold">Épica</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="mood" type="radio" value="chill"/>
<div class="p-3 rounded-lg border border-white/10 bg-surface-container/50 peer-checked:border-secondary peer-checked:bg-secondary/10 transition-all text-center">
<span class="block text-xl mb-1">🌙</span>
<span class="font-body-md text-sm text-on-surface font-semibold">Tranquila</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="mood" type="radio" value="dark"/>
<div class="p-3 rounded-lg border border-white/10 bg-surface-container/50 peer-checked:border-tertiary peer-checked:bg-tertiary/10 transition-all text-center">
<span class="block text-xl mb-1">🦇</span>
<span class="font-body-md text-sm text-on-surface font-semibold">Oscura</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="mood" type="radio" value="social"/>
<div class="p-3 rounded-lg border border-white/10 bg-surface-container/50 peer-checked:border-primary-fixed-dim peer-checked:bg-primary-fixed-dim/10 transition-all text-center">
<span class="block text-xl mb-1">🥂</span>
<span class="font-body-md text-sm text-on-surface font-semibold">Social</span>
</div>
</label>
</div>
</section>
<!-- Description Textarea -->
<section class="glass-card rounded-xl p-inline-md space-y-card-gap">
<label class="font-body-lg text-body-lg text-on-surface flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">edit_note</span>
                    Diario de a bordo
                </label>
<textarea class="w-full p-4 rounded-lg input-glass font-body-md text-body-md text-on-surface placeholder:text-outline-variant resize-none" placeholder="Describe tu noche... ¿Qué tal la música? ¿Alguna anécdota?" rows="3"></textarea>
</section>
<!-- Primary Action Button -->
<div class="pt-4 pb-8">
<button class="w-full h-14 rounded-xl bg-gradient-to-r from-primary to-tertiary text-on-primary font-headline-md text-lg glow-primary flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Siguiente paso
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</main>
<!-- Bottom Navigation Suppressed per instructions: Task-Focused / Linear Flow -->
</body></html>
