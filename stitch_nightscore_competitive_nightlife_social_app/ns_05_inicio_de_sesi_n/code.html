<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
<!-- Ambient Background Effects -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container/10 blur-[80px]"></div>
</div>
<!-- Main Content Area - Transactional View, No Navigation Shells -->
<main class="flex-grow flex flex-col justify-center items-center px-container-padding-h py-section-margin relative z-10 w-full max-w-md mx-auto">
<!-- Brand Header -->
<div class="text-center mb-section-margin w-full">
<h1 class="font-display-hero text-display-hero bg-gradient-to-r from-primary to-tertiary bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(210,187,255,0.3)]">NightScore</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-inline-sm">Bienvenido de vuelta a la cima.</p>
</div>
<!-- Login Form Card -->
<div class="w-full bg-surface-container-low/60 backdrop-blur-xl border border-white/10 rounded-xl p-container-padding-h shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
<form action="#" class="space-y-inline-md flex flex-col w-full" method="POST">
<!-- Email Input -->
<div class="space-y-inline-sm flex flex-col">
<label class="font-caption-caps text-caption-caps text-on-surface-variant" for="email">Correo Electrónico</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-inline-md text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-12 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="email" name="email" placeholder="tu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-inline-sm flex flex-col">
<div class="flex justify-between items-center">
<label class="font-caption-caps text-caption-caps text-on-surface-variant" for="password">Contraseña</label>
<a class="font-caption-caps text-caption-caps text-primary hover:text-primary-fixed transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-inline-md text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-12 pr-12 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-inline-md text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-inline-md bg-gradient-to-r from-primary-container to-tertiary-container text-on-primary-container font-body-lg text-body-lg rounded-lg py-3 shadow-[0_0_24px_rgba(124,58,237,0.3)] hover:opacity-90 active:scale-95 transition-all flex justify-center items-center" type="submit">
                    Iniciar sesión
                </button>
</form>
<!-- Divider -->
<div class="flex items-center justify-between my-inline-md">
<hr class="w-full border-t border-white/10"/>
<span class="font-caption-caps text-caption-caps text-on-surface-variant px-4 whitespace-nowrap">O CONTINÚA CON</span>
<hr class="w-full border-t border-white/10"/>

<script>
        // Simple script to toggle password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('button[type="button"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = toggleButton.querySelector('.material-symbols-outlined');

            toggleButton.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    iconSpan.textContent = 'visibility_off';
                } else {
                    passwordInput.type = 'password';
                    iconSpan.textContent = 'visibility';
                }
            });
        });
    </script>
