<style>
        body {

            color: theme('colors.on-background');

            background: rgba(19, 19, 24, 0.6);

        }

            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
        }
        
        /* Confetti container and items */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: theme('colors.primary');
            opacity: 0;

<script>
        // Simple Confetti Generator
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-canvas');
            const colors = ['#d2bbff', '#4cd7f6', '#bf2076', '#acedff']; // Primary, Secondary, Tertiary, Secondary-Fixed
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Randomize properties
                const left = Math.random() * 100;
                const animDuration = Math.random() * 3 + 2; // 2s - 5s
                const animDelay = Math.random() * 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                confetti.style.left = `${left}%`;
                confetti.style.backgroundColor = color;
                confetti.style.animationDuration = `${animDuration}s`;
                confetti.style.animationDelay = `${animDelay}s`;
                
                // Random shapes (square or slightly rounded)
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                container.appendChild(confetti);
            }
        });
    </script>
</body></html>
