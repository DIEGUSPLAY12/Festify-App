<style>
        .glass-panel {
            background: rgba(19, 19, 24, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-glow-primary {
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
        }
        .input-glow:focus-within {
            border-color: #4cd7f6;
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.2);
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md">
<!-- Ambient Background Effects -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-tertiary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<main class="w-full max-w-md px-container-padding-h py-section-margin z-10">
<!-- Header / Logo -->
<div class="text-center mb-8">
<h1 class="font-display-hero text-display-hero bg-gradient-to-r from-primary to-tertiary bg-clip-text text-transparent mb-2">Festify</h1>
<h2 class="font-headline-md text-headline-md text-on-surface">Crea tu cuenta</h2>
</div>
<!-- Registration Form Card -->
<div class="glass-panel rounded-xl p-inline-md flex flex-col gap-6">
<form class="flex flex-col gap-4">
<!-- Username Input -->
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface-variant" for="username">Username</label>
<div class="relative input-glow rounded-lg border border-white/10 bg-surface transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="person">person</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md py-3 pl-10 pr-4 focus:ring-0 placeholder:text-on-surface-variant/50" id="username" placeholder="Tu usuario" type="text">
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface-variant" for="email">Email</label>
<div class="relative input-glow rounded-lg border border-white/10 bg-surface transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md py-3 pl-10 pr-4 focus:ring-0 placeholder:text-on-surface-variant/50" id="email" placeholder="correo@ejemplo.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface-variant" for="password">Password</label>
<div class="relative input-glow rounded-lg border border-white/10 bg-surface transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md py-3 pl-10 pr-10 focus:ring-0 placeholder:text-on-surface-variant/50" id="password" placeholder="Mínimo 8 caracteres" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-secondary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="mt-2 w-full py-3 rounded-full bg-gradient-to-r from-primary-container to-tertiary-container text-white font-body-lg text-body-lg neon-glow-primary hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Crear cuenta
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-px bg-white/10"></div>
<span class="font-caption-caps text-caption-caps text-on-surface-variant">O continúa con</span>
<div class="flex-1 h-px bg-white/10"></div>
</div>
<!-- OAuth Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full py-3 rounded-full bg-white text-surface-lowest font-body-lg text-body-lg flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined" data-icon="login">login</span>
                    Google
                </button>
<button class="w-full py-3 rounded-full bg-black text-white border border-white/20 font-body-lg text-body-lg flex items-center justify-center gap-2 hover:bg-gray-900 transition-colors">
<span class="material-symbols-outlined" data-icon="apple">ios</span>
                    Apple
                </button>
</div>
<!-- Login Link -->
<div class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿Ya tienes cuenta? 
                    <a class="text-secondary hover:text-secondary-fixed transition-colors ml-1" href="#">Inicia sesión</a>
</p>
</div>
</div>
</main>
<script>
        // Simple password toggle logic
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const iconSpan = this.querySelector('span');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                iconSpan.textContent = 'visibility_off';
                iconSpan.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                iconSpan.textContent = 'visibility';
                iconSpan.setAttribute('data-icon', 'visibility');
            }
        });
    </script>
