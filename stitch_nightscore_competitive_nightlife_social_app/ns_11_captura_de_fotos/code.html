<style>
        .glow-button {
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
        }
        .shutter-inner {
            transition: transform 0.1s ease-in-out;
        }
        .shutter-btn:active .shutter-inner {
            transform: scale(0.9);
        }
        .camera-overlay {
            background: linear-gradient(to bottom, rgba(19, 19, 24, 0.8) 0%, transparent 20%, transparent 80%, rgba(19, 19, 24, 0.95) 100%);

<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col font-body-md select-none">

<div class="absolute inset-0 z-0 bg-surface-container">

<!-- Dual Camera PiP (BeReal Mode) -->
<div class="absolute top-24 left-container-padding-h w-28 h-40 rounded-lg overflow-hidden border-[1.5px] border-secondary shadow-[0_0_15px_rgba(76,215,246,0.3)] z-10 transition-transform hover:scale-105 cursor-pointer hidden" id="pip-camera">
<img alt="Selfie view" class="w-full h-full object-cover" data-alt="A clear, front-facing selfie shot of a young adult looking directly into the camera, bathed in dramatic neon violet and cyan lighting. The background is a blurred, high-end nightclub interior. The image perfectly encapsulates the premium, energetic nightlife aesthetic, utilizing deep shadows and vibrant neon accents consistent with a dark minimal UI style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVl42nchDJUydfPPcGRpUK8ID6QYL-3x8e66rYDEH_8Mvyc_9-7jtbgohbh72kPu05a8Ine7nXh4dLUgMR2irB5xs-VoyNldWZcyLtoxSdpMf1DiTp_FTXRh3gRuFqOThcBbrcwBFDoSejgu3OV7enF0biwbvF2hKRIbLOI43pRvB2qsfMcpxSUNe6aE3_K7atYLQbIJYXiZUAwAMEQQ1yyr-w-9toIK2oL7d0_oqQIR68VvRC2UZrZj3IclCEhdhYhXk4ocviWfs"/>
</div>
<div class="absolute inset-0 camera-overlay z-0 pointer-events-none"></div>
</div>
<!-- Top Navigation (Transactional/Task-focused, suppressing global nav) -->
<header class="relative z-50 flex justify-between items-center px-container-padding-h h-20 w-full bg-transparent">
<button class="w-10 h-10 rounded-full bg-surface/40 backdrop-blur-md flex items-center justify-center border border-white/10 text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-surface/40 backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">photo_library</span>
<span class="font-data-mono text-data-mono text-secondary">3/10</span>
</div>
<button class="px-4 py-2 rounded-full bg-gradient-to-r from-primary-container to-tertiary-container text-white font-body-md font-bold glow-button active:scale-95 transition-all flex items-center gap-1">
            Siguiente
            <span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</header>
<!-- Main Content Canvas (Empty to show camera) -->
<main class="relative z-10 flex-1 flex flex-col justify-end pb-8">
<!-- Thumbnail Strip -->
<div class="px-container-padding-h mb-section-margin w-full overflow-x-auto no-scrollbar">
<div class="flex gap-card-gap items-center pb-2">
<!-- Thumbnail 1 -->
<div class="w-16 h-20 rounded-lg overflow-hidden border border-white/20 shrink-0 relative">
<img alt="Thumb" class="w-full h-full object-cover" data-alt="A small thumbnail image showing a close up of a cocktail glass glowing under UV light in a dark club. Deep purples and bright cyans dominate the composition. Premium night club aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUP7ggnMYOnf2ybFn9p1PGUXzZMM0_vUMnOQi0DHrgxzzAFbTo1nO9B0RBmFyh5Y2PVlqXWOYQNttn5chek1xoHgfodQeMLSU2-20SjMoNMt599ml_5LKHNHcazylwS923FaYcmr_83n6dUbT9go_RnTQaaZdL3gFAzbvmac8Lh3zZFjlSi2O2lsDOcL3wVScP0onqkc9SdxDO_Kraxx_G3O6L1S6U6XfWCtc7sdZIn7Pmik0GwPF_vAM8zz4cdsRNvuu8y92Dr78"/>
<div class="absolute inset-0 bg-black/20 hover:bg-transparent transition-colors cursor-pointer"></div>
</div>
<!-- Thumbnail 2 -->
<div class="w-16 h-20 rounded-lg overflow-hidden border border-white/20 shrink-0 relative">
<img alt="Thumb" class="w-full h-full object-cover" data-alt="A small thumbnail image depicting a DJ deck illuminated by stark neon pink and blue lights. The scene is dark, modern, and energetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDA_njEZFaAq5AuhotO34Gwm-HrhUNlhWnIKXZu_0RJf8WribDp9agKDpBXGQUTvXRc_1DX9q-DDyM7L1Ul4Ik_keFMweWAcOuTLrxA3cGtb0S_THNmRLfFQHfkuZy6A3QJ4HX1_t9eMHnKm41dgqJjoFi-Hj_yAfAIx_cvRigB5pqsnmb_4EQ-vl5OxuGsAvEdM7s-eYlOqVHlVdTmzOAZ-XlEEajVyidovvmZ0UNqNDP10aCU5WcaH2AIb65LpYz_7uZy8QsydLI"/>
<div class="absolute inset-0 bg-black/20 hover:bg-transparent transition-colors cursor-pointer"></div>
</div>
<!-- Thumbnail 3 -->
<div class="w-16 h-20 rounded-lg overflow-hidden border border-secondary shrink-0 relative shadow-[0_0_10px_rgba(76,215,246,0.3)]">
<img alt="Thumb" class="w-full h-full object-cover" data-alt="A small thumbnail showing a blurred crowd dancing under dramatic laser lights in a premium nightclub setting. Dark minimalism style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuIjnDKwFG0fUMJq4Wppm8Ssmrh-Ay-WsMXidNSrS99cELksq4HInecsepB4zUQj7SlJK5Xa6fbbE30cieS-eP7d4_YWMKGtml85TQBAeNSOrg7aN0uWlVohwHjIm2xj-RGxNmrQqOUwJiQyO4KuDwxnYOteJ2do_prz3WltWgnZZez0kviz0fBssFXILvtm_J7S789q9z8c61c6-5P5kmKBpVpB0T5cDOvMchMjEzwn_2scoyQeEw7epNwUibysu2NpdFTdkunjo"/>
<div class="absolute inset-0 bg-black/0 cursor-pointer"></div>
<button class="absolute top-1 right-1 w-5 h-5 rounded-full bg-surface/80 flex items-center justify-center backdrop-blur-sm">
<span class="material-symbols-outlined text-[12px] text-error">close</span>
</button>
</div>
<!-- Add More Ghost Placeholder -->
<div class="w-16 h-20 rounded-lg border border-dashed border-outline-variant flex items-center justify-center shrink-0 bg-surface/20 backdrop-blur-sm text-outline-variant">
<span class="material-symbols-outlined">add</span>
</div>
</div>
</div>
<!-- Camera Controls -->
<div class="px-container-padding-h flex justify-between items-center h-28">
<!-- Gallery / Left Control -->
<button class="w-12 h-12 rounded-full bg-surface/40 backdrop-blur-xl border border-white/10 flex items-center justify-center text-on-surface hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">image</span>
</button>
<!-- Center Shutter Container -->
<div class="flex items-center gap-6">
<!-- Dual Mode Toggle (BeReal style) -->
<button class="w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant flex items-center justify-center text-secondary transition-all hover:bg-surface-bright active:scale-95" id="toggle-dual" title="Modo Dual">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">cameraswitch</span>
</button>
<!-- Big Shutter Button -->
<button class="w-20 h-20 rounded-full border-[3px] border-white p-1 flex items-center justify-center shutter-btn outline-none focus:outline-none">
<div class="w-full h-full rounded-full bg-white shutter-inner shadow-[0_0_20px_rgba(255,255,255,0.3)]"></div>
</button>
<!-- Flash Toggle -->
<button class="w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant flex items-center justify-center text-on-surface transition-all hover:bg-surface-bright active:scale-95" id="flash-btn">
<span class="material-symbols-outlined" id="flash-icon" style="font-variation-settings: 'FILL' 0;">flash_off</span>
</button>
</div>
<!-- Flip Camera / Right Control -->
<button class="w-12 h-12 rounded-full bg-surface/40 backdrop-blur-xl border border-white/10 flex items-center justify-center text-on-surface hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flip_camera_ios</span>
</button>
</div>
</main>
<!-- Bottom Indicator for iPhone style -->
<div class="h-8 w-full flex justify-center items-center pb-2 z-50">
<div class="w-1/3 h-1 bg-white/20 rounded-full"></div>
</div>
<script>
        // Simple interactions
        document.getElementById('toggle-dual').addEventListener('click', function() {
            const pip = document.getElementById('pip-camera');
            this.classList.toggle('border-secondary');
            this.classList.toggle('bg-secondary/20');
            this.classList.toggle('glow-button');
            
            if(pip.classList.contains('hidden')) {
                pip.classList.remove('hidden');
            } else {
                pip.classList.add('hidden');
            }
        });

        document.getElementById('flash-btn').addEventListener('click', function() {
            const icon = document.getElementById('flash-icon');
            if(icon.innerText === 'flash_off') {
                icon.innerText = 'flash_on';
                this.classList.add('text-secondary');
            } else if (icon.innerText === 'flash_on') {
                icon.innerText = 'flash_auto';
                this.classList.replace('text-secondary', 'text-primary');
            } else {
                icon.innerText = 'flash_off';
                this.classList.remove('text-primary');
            }
        });
    </script>
</body></html>
