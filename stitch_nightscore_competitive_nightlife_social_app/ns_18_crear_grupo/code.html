<form class="flex-1 flex flex-col" id="create-group-form" onsubmit="event.preventDefault();">
<!-- Step 1: Info -->

</div>
<div class="space-y-6">
<div class="flex flex-col gap-2">

</div>
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface-variant ml-1">Descripción</label>
<textarea class="glass-input rounded-xl px-4 py-4 font-body-md text-body-md text-on-surface w-full placeholder:text-outline resize-none transition-all" placeholder="¿De qué trata este grupo?" rows="3"></textarea>
</div>
</div>
</div>
<!-- Step 2: Privacy -->
<div class="flex-1 flex flex-col step-hidden animate-fade-in" id="step-2">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Privacidad</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">¿Quién puede unirse a tu grupo?</p>
<div class="space-y-4">
<label class="flex items-start p-4 rounded-xl glass-input cursor-pointer hover:bg-surface-variant/50 transition-colors border border-primary">
<input checked="" class="mt-1 w-5 h-5 text-primary bg-surface border-outline focus:ring-primary focus:ring-offset-background" name="privacy" type="radio" value="invite"/>
<div class="ml-4 flex-1">
<span class="block font-body-lg text-body-lg text-on-surface">Solo con invitación</span>
<span class="block font-body-md text-body-md text-on-surface-variant mt-1">Nadie puede encontrar este grupo en las búsquedas. Solo se unen con enlace.</span>
</div>
<span class="material-symbols-outlined text-primary ml-2" data-icon="lock">lock</span>
</label>
<label class="flex items-start p-4 rounded-xl glass-input cursor-pointer hover:bg-surface-variant/50 transition-colors">
<input class="mt-1 w-5 h-5 text-primary bg-surface border-outline focus:ring-primary focus:ring-offset-background" name="privacy" type="radio" value="public"/>
<div class="ml-4 flex-1">
<span class="block font-body-lg text-body-lg text-on-surface">Abierto a búsquedas</span>
<span class="block font-body-md text-body-md text-on-surface-variant mt-1">Cualquier usuario puede encontrar el grupo y solicitar unirse.</span>
</div>

</div>

<input class="checkbox-custom w-6 h-6 rounded-md border-outline bg-surface-dim focus:ring-primary focus:ring-offset-background ml-2" type="checkbox"/>

<div class="mt-auto pt-6 pb-6">
<button class="w-full bg-gradient-to-r from-primary-container to-tertiary-container text-white font-body-lg text-body-lg py-4 rounded-xl shadow-[0_0_24px_rgba(124,58,237,0.3)] hover:shadow-[0_0_32px_rgba(124,58,237,0.5)] transition-all active:scale-[0.98]" id="btn-next" type="button">
                    Siguiente
                </button>
</div>
</form>

<script>
        const steps = [
            document.getElementById('step-1'),
            document.getElementById('step-2'),
            document.getElementById('step-3')
        ];
        const indicators = [
            document.getElementById('ind-1'),
            document.getElementById('ind-2'),
            document.getElementById('ind-3')
        ];
        const btnNext = document.getElementById('btn-next');
        const btnBack = document.getElementById('btn-back');
        let currentStep = 0;

        function updateUI() {
            // Update steps visibility
            steps.forEach((step, index) => {
                if (index === currentStep) {
                    step.classList.remove('step-hidden');
                } else {
                    step.classList.add('step-hidden');
                }
            });

            // Update indicators
            indicators.forEach((ind, index) => {
                if (index <= currentStep) {
                    ind.classList.remove('bg-surface-variant');
                    ind.classList.add('bg-primary');
                } else {
                    ind.classList.remove('bg-primary');
                    ind.classList.add('bg-surface-variant');
                }
            });

            // Update button text
            if (currentStep === steps.length - 1) {
                btnNext.textContent = 'Crear grupo';
            } else {
                btnNext.textContent = 'Siguiente';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                // Submit form logic here
                btnNext.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                setTimeout(() => {
                    alert('Grupo creado exitosamente');
                }, 1000);
            }
        });

        btnBack.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            } else {
                // Go back to previous screen
                alert('Volver atrás');
            }
        });
        
        // Radio button styling update
        const radioLabels = document.querySelectorAll('input[type="radio"][name="privacy"]');
        radioLabels.forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('input[type="radio"][name="privacy"]').forEach(r => {
                   r.closest('label').classList.remove('border', 'border-primary');
                   r.closest('label').querySelector('.material-symbols-outlined').classList.replace('text-primary', 'text-outline');
                });
                if(e.target.checked) {
                    e.target.closest('label').classList.add('border', 'border-primary');
                    e.target.closest('label').querySelector('.material-symbols-outlined').classList.replace('text-outline', 'text-primary');
                }
            });
        });
    </script>
</body></html>
