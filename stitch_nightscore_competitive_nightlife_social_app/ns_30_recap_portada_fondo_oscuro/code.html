<!DOCTYPE html><html class="dark" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Festify Recap Portada</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com" rel="preconnect">

<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&amp;family=Hanken+Grotesk:wght@500;600;700&amp;family=Sora:wght@700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#1b1b20",
                        "secondary": "#4cd7f6",
                        "on-error": "#690005",

                        "secondary-fixed-dim": "#4cd7f6",
                        "tertiary-fixed-dim": "#ffb0cd",
                        "surface-variant": "#35343a",
                        "surface-container-high": "#2a292f",

                        "on-secondary-fixed-variant": "#004e5c",
                        "tertiary-container": "#bf2076",
                        "surface": "#131318",
                        "on-secondary": "#003640",
                        "surface-dim": "#131318",
                        "inverse-on-surface": "#303036",
                        "secondary-fixed": "#acedff",
                        "on-surface": "#e4e1e9",
                        "on-primary": "#3f008e",
                        "inverse-primary": "#732ee4",
                        "on-tertiary": "#640039",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#001f26",
                        "surface-container-highest": "#35343a",
                        "primary-fixed": "#eaddff",
                        "on-tertiary-fixed": "#3e0022",
                        "primary-fixed-dim": "#d2bbff",
                        "on-primary-fixed-variant": "#5a00c6",

                        "surface-bright": "#39383e",
                        "primary-container": "#7c3aed",
                        "inverse-surface": "#e4e1e9",
                        "outline": "#958da1",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "32px",
                        "container-padding-h": "20px",
                        "inline-md": "16px",
                        "inline-sm": "8px",
                        "card-gap": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Sora", "sans-serif"],
                        "display-hero": ["Sora", "sans-serif"],

<style>
        body {
            background-color: #0e0e13;
            color: #e4e1e9;
        }
        
        .bg-recap-gradient {
            background: radial-gradient(circle at 50% 30%, rgba(124, 58, 237, 0.15) 0%, rgba(14, 14, 19, 1) 80%);
        }
        
        .lens-flare {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 215, 246, 0.08) 0%, transparent 70%);
            top: -50px;
            right: -100px;
            filter: blur(60px);
            pointer-events: none;
        }

        .lens-flare-primary {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(115, 46, 228, 0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -150px;
            filter: blur(80px);
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 48px 0 rgba(0, 0, 0, 0.5);
        }

        .btn-glow {
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased min-h-screen relative overflow-hidden bg-recap-gradient flex flex-col bg-surface-container-lowest">
<!-- Atmospheric Effects -->
<div class="lens-flare"></div>
<div class="lens-flare-primary"></div>
<!-- Story Progress Bar -->
<div class="fixed top-0 left-0 w-full z-50 px-container-padding-h pt-4">
<div class="flex gap-2 w-full h-1">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-container-padding-h h-16 pt-6">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div class="font-display-hero text-display-hero text-primary"></div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-container-padding-h relative z-10 w-full max-w-md mx-auto pt-24 pb-32">
<!-- Headline -->
<div class="text-center mb-16">
<h1 class="font-display-hero text-display-hero text-on-surface mb-2 tracking-tight">TU NOVIEMBRE</h1>
<h2 class="font-headline-md text-headline-md text-primary">EN FESTIFY</h2>
</div>
<!-- Center Floating Card -->
<div class="glass-card rounded-xl p-8 flex flex-col items-center justify-center animate-float w-full max-w-[280px] aspect-square relative">
<!-- Inner subtle glow for the score -->
<div class="absolute inset-0 rounded-xl bg-primary/5 blur-xl"></div>
<p class="font-caption-caps text-caption-caps text-on-surface-variant mb-4 relative z-10">SCORE PROMEDIO</p>
<div class="font-display-hero text-[80px] leading-none text-white relative z-10 drop-shadow-[0_0_15px_rgba(210,187,255,0.5)]">
                8.9
            </div>
<div class="mt-6 flex items-center gap-2 bg-surface-variant/50 rounded-full px-4 py-1.5 border border-white/5 relative z-10">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="font-data-mono text-data-mono text-secondary">+1.2 vs Oct</span>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-container-padding-h pb-8 pt-4 z-50 bg-gradient-to-t from-background to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full bg-gradient-to-r from-primary-container to-tertiary-container text-white font-body-lg text-body-lg rounded-full py-4 btn-glow hover:brightness-110 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
<span class="">Empezar</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</div>


</body></html>
