<!DOCTYPE html><html class="dark" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>NightScore - Consumiciones</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;family=Hanken+Grotesk:wght@500;600;700&amp;family=Geist+Mono:wght@500&amp;display=swap" rel="stylesheet">

                extend: {
                    "colors": {
                        "on-tertiary-container": "#ffdde7",

                        "inverse-primary": "#732ee4",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#8c0053",
                        "surface-container-high": "#2a292f",
                        "primary-fixed-dim": "#d2bbff",
                        "on-tertiary-fixed": "#3e0022",
                        "on-surface": "#e4e1e9",
                        "on-secondary-container": "#00424e",
                        "tertiary-fixed": "#ffd9e4",
                        "outline-variant": "#4a4455",
                        "on-primary-container": "#ede0ff",
                        "on-primary-fixed-variant": "#5a00c6",
                        "on-primary": "#3f008e",
                        "surface-container": "#1f1f25",
                        "on-primary-fixed": "#25005a",
                        "surface": "#131318",
                        "background": "#131318",
                        "secondary-fixed": "#acedff",
                        "error": "#ffb4ab",
                        "tertiary": "#ffb0cd",
                        "secondary": "#4cd7f6",
                        "inverse-surface": "#e4e1e9",

                        "on-secondary-fixed-variant": "#004e5c",

                    "borderRadius": {

                    "spacing": {
                        "section-margin": "32px",
                        "inline-md": "16px",
                        "container-padding-h": "20px",
                        "card-gap": "12px",
                        "inline-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Sora"],
                        "headline-lg": ["Sora"],
                        "body-md": ["Hanken Grotesk"],
                        "caption-caps": ["Hanken Grotesk"],
                        "display-hero": ["Sora"],

                        "body-lg": ["Hanken Grotesk"]

                    "fontSize": {

<style>
        .neon-glow-primary { box-shadow: 0 0 24px rgba(124,58,237,0.3); }
        .glass-card { background: rgba(19, 19, 24, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card.active { border-color: rgba(124, 58, 237, 0.8); box-shadow: inset 0 0 12px rgba(124, 58, 237, 0.2); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-white/5 bg-background/80 backdrop-blur-lg flex justify-between items-center px-container-padding-h h-16 w-full">
<button class="text-on-surface hover:text-secondary transition-colors active:opacity-70 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu</span>
</button>
<span class="font-headline-lg text-headline-lg bg-gradient-to-r from-primary to-tertiary bg-clip-text text-transparent">Festify</span>
<button class="text-on-surface hover:text-secondary transition-colors active:opacity-70 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">notifications</span>
</button>
</header>
<main class="pt-24 px-container-padding-h">
<!-- Header Section -->
<section class="mb-section-margin text-center">
<p class="font-caption-caps text-caption-caps text-primary uppercase mb-2">Paso 2 de 4</p>
<h1 class="font-display-hero text-display-hero text-on-surface mb-2">¿Qué tomaste esta noche?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Registra tus consumiciones para calcular tu impacto.</p>
</section>
<!-- Drinks Grid -->
<section class="grid grid-cols-2 gap-card-gap mb-section-margin">
<!-- Drink Card 1: Cubata (Active Example) -->
<div class="glass-card active rounded-xl p-inline-md flex flex-col items-center justify-between min-h-[160px]">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary text-3xl">local_bar</span>
</div>
<h3 class="font-body-md text-body-md text-on-surface mb-4">Cubata</h3>
<div class="flex items-center justify-between w-full bg-surface-container-high rounded-full p-1 border border-white/5">
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="font-data-mono text-data-mono text-primary w-8 text-center">2</span>
<button class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Drink Card 2: Cerveza -->
<div class="glass-card rounded-xl p-inline-md flex flex-col items-center justify-between min-h-[160px]">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">sports_bar</span>
</div>
<h3 class="font-body-md text-body-md text-on-surface mb-4">Cerveza</h3>
<div class="flex items-center justify-between w-full bg-surface-container-high rounded-full p-1 border border-white/5">
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface/50 opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="font-data-mono text-data-mono text-on-surface-variant w-8 text-center">0</span>
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Drink Card 3: Vino -->
<div class="glass-card rounded-xl p-inline-md flex flex-col items-center justify-between min-h-[160px]">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">wine_bar</span>
</div>
<h3 class="font-body-md text-body-md text-on-surface mb-4">Vino</h3>
<div class="flex items-center justify-between w-full bg-surface-container-high rounded-full p-1 border border-white/5">
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface/50 opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="font-data-mono text-data-mono text-on-surface-variant w-8 text-center">0</span>
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Drink Card 4: Chupito (Active Example) -->
<div class="glass-card active rounded-xl p-inline-md flex flex-col items-center justify-between min-h-[160px]">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary text-3xl">liquor</span>
</div>
<h3 class="font-body-md text-body-md text-on-surface mb-4">Chupito</h3>
<div class="flex items-center justify-between w-full bg-surface-container-high rounded-full p-1 border border-white/5">
<button class="w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="font-data-mono text-data-mono text-primary w-8 text-center">3</span>
<button class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Drink Card 5: Cóctel -->
<div class="glass-card rounded-xl p-inline-md flex flex-col items-center justify-between min-h-[160px] col-span-2">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">local_cafe</span>
</div>
<h3 class="font-body-md text-body-md text-on-surface mb-4">Cóctel Especial</h3>
<div class="flex items-center justify-between w-3/4 max-w-[200px] bg-surface-container-high rounded-full p-1 border border-white/5">
<button class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface/50 opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-data-mono text-data-mono text-on-surface-variant w-12 text-center text-lg">0</span>
<button class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
</main>
<!-- Floating Summary & Action -->
<div class="fixed bottom-0 left-0 w-full p-container-padding-h bg-surface/80 backdrop-blur-xl border-t border-white/5 z-40 rounded-t-xl shadow-[0_-4px_24px_rgba(124,58,237,0.1)]">
<div class="flex justify-between items-center mb-4">
<div>
<p class="font-caption-caps text-caption-caps text-on-surface-variant uppercase">Total Registrado</p>
<p class="font-headline-md text-headline-md text-on-surface"><span class="text-primary font-data-mono">5</span> Consumiciones</p>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container border border-primary/30 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">monitoring</span>
</div>
</div>
<button class="w-full h-14 bg-gradient-to-r from-primary to-tertiary rounded-lg font-body-lg text-body-lg text-white font-semibold neon-glow-primary flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
            Siguiente Paso
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>


</body></html>
